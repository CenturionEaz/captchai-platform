version: "3.9"

# ─── CaptchaIQ Local Development Stack ───────────────────────────────────────
#
# Usage:
#   cp .env.example .env.docker
#   docker compose -f docker/docker-compose.dev.yml up
#
# Services:
#   - api  → FastAPI backend  → http://localhost:8000
#   - web  → Next.js frontend → http://localhost:3000
#
# Database/Auth: Supabase (cloud — set env vars in .env.docker)
# No local Postgres or Redis required.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: captchaiq-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - model_cache:/app/models
      - uploads:/app/uploads
    env_file:
      - ../.env.docker
    environment:
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: captchaiq-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ../.env.docker
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  model_cache:
  uploads:

networks:
  default:
    name: captchaiq-network
